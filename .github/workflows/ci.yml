name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: read-only by default. Jobs opt into more where needed.
permissions:
  contents: read

# Cancel superseded runs on PRs (e.g. rapid pushes). Never cancel runs on
# main so every merged commit gets a complete verdict.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Classify the change so docs-only edits skip the heavy jobs. Downstream
  # jobs skip based on these outputs; the ci-ok gate treats skipped as OK.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read # paths-filter lists changed files via the PR API
    outputs:
      code: ${{ steps.filter.outputs.code }}
      dependencies: ${{ steps.filter.outputs.dependencies }}
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            # Anything that can influence lint/typecheck/test/build results.
            code:
              - '**'
              - '!**/*.md'
              - '!LICENSE'
              - '!.gitignore'
              - '!.gitattributes'
              - '!example.config.toml'
              - '!example.streams.toml'
              - '!.github/dependabot.yml'
            dependencies:
              - 'package.json'
              - 'package-lock.json'
              - 'packages/*/package.json'
            # Everything the control-server image is built from: the four
            # workspaces the Dockerfile copies, the root manifests `npm ci`
            # reads, and the deploy stack itself.
            docker:
              - 'packages/streamwall-shared/**'
              - 'packages/streamwall-control-server/**'
              - 'packages/streamwall-control-client/**'
              - 'packages/streamwall-control-ui/**'
              - 'deploy/**'
              - 'package.json'
              - 'package-lock.json'
              - '.dockerignore'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'

  # One install, three checks. Prettier always runs because it also checks
  # Markdown and YAML; ESLint and tsc only matter for code changes. Later
  # steps run even if an earlier one fails so a single run reports them all.
  checks:
    name: Static checks
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Format (Prettier)
        run: npm run format:check
      - name: Lint (ESLint)
        if: ${{ !cancelled() && needs.changes.outputs.code == 'true' }}
        run: npm run lint
      - name: Typecheck (tsc)
        if: ${{ !cancelled() && needs.changes.outputs.code == 'true' }}
        run: npm run typecheck

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: npm test

  build:
    name: Build (web control client)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: npm -w streamwall-control-client run build

  # Packaging smoke test for the Electron desktop app. Catches Vite/Forge
  # misconfiguration, native module unpacking (bufferutil, utf-8-validate)
  # and missing packaged assets at PR time instead of during a release,
  # where the same failure burns runner minutes across three OS legs.
  #
  # `package` only, not `make`: it exercises the Vite builds, asar packing
  # and native rebuild without paying for the maker-specific installer
  # steps (NSIS, darwin zip, deb, rpm). Those are covered outside of PR CI
  # by the weekly `.github/workflows/packaging.yml` matrix. Ubuntu alone is
  # enough for a smoke test — the shared failure modes are OS-independent.
  # Runtime: ~45 seconds (measured on ubuntu-latest, cached npm), and it runs
  # in parallel with the other jobs, so wall-clock CI time is unchanged.
  package:
    name: Package smoke (Electron app)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: npm -w streamwall run package

  # End-to-end smoke tests: the control client in a real Chromium browser
  # against a real control server + fake Streamwall uplink. Linux-only (the
  # Playwright browser install with system deps is Linux-only), so this stays
  # out of the cross-OS `test` matrix above.
  e2e:
    name: E2E smoke (control client)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke tests
        run: npm run test:e2e

  # Self-hosting smoke test: builds the control-server image the way
  # docs/self-hosting.md and deploy/docker-compose.yml build it (repository
  # root as context). Without this, workspace-boundary mistakes in the
  # Dockerfile (COPY paths, missing `npm ci` workspace filters, a broken
  # control-client build) only surface when an operator deploys.
  #
  # The image is also started once: a container that builds but exits at
  # boot is just as broken for self-hosters, and the check costs seconds.
  docker:
    name: Docker build (control server)
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Renders the compose stack with the documented .env.example values, so
      # a compose file that references a removed service, volume or variable
      # fails here instead of on an operator's host.
      - name: Validate compose stack
        working-directory: deploy
        run: |
          cp .env.example .env
          docker compose config --quiet
      - name: Build control-server image
        run: docker build -f packages/streamwall-control-server/Dockerfile -t streamwall-control-server:ci .
      - name: Smoke test the image
        run: |
          docker run -d --name control-server -p 3000:3000 \
            -e STREAMWALL_CONTROL_URL=http://localhost:3000 \
            streamwall-control-server:ci
          for _ in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:3000/; then
              echo "Control server served the web control client."
              exit 0
            fi
            sleep 1
          done
          echo "Control server did not respond within 30s."
          docker logs control-server
          exit 1

  # Production dependencies are redistributed inside the release binaries, so
  # their licenses have to stay compatible with shipping an MIT-licensed
  # bundle. A transitive bump can introduce a new license without touching a
  # first-party dependency, which is why this runs on every code change rather
  # than only on manifest edits. Policy and allowlist: CONTRIBUTING.md.
  licenses:
    name: Dependency licenses
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: npm run licenses:check

  # Reviews the dependency diff of a PR for known vulnerabilities.
  dependency-review:
    name: Dependency review
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.dependencies == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # posts a summary comment when the review fails
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # Static security analysis. Runs here — instead of standing alone — so that
  # a CodeQL failure fails the single `CI OK` check branch protection requires.
  # The same analysis runs weekly from codeql.yml's schedule.
  codeql:
    name: CodeQL
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      security-events: write
      actions: read
      contents: read
    uses: ./.github/workflows/codeql.yml

  # Lints the workflow files themselves (also shellchecks run: scripts).
  actionlint:
    name: Lint workflows (actionlint)
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color

  # Single required status check: green when every needed job succeeded or
  # was skipped (docs-only changes), red when any failed. Configure branch
  # protection to require only this check.
  ci-ok:
    name: CI OK
    if: ${{ !cancelled() }}
    needs:
      [
        changes,
        checks,
        test,
        build,
        package,
        e2e,
        docker,
        dependency-review,
        licenses,
        codeql,
        actionlint,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: echo "$NEEDS_JSON"
      - name: Fail if any needed job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
