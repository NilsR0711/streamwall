name: CodeQL

# The analysis itself, with no trigger of its own. ci.yml calls it as a job of
# the `CI OK` gate — that is what makes a CodeQL failure block a merge — and
# codeql-schedule.yml calls it for the weekly scan. The schedule lives there
# rather than here because a caller can never grant a called workflow more
# permissions than it holds itself, so the weekly run's `issues: write`
# reporting job would otherwise have to be granted by ci.yml as well.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          language: ${{ matrix.language }}
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          # Without an explicit category, the uploaded results are keyed by the
          # calling workflow, so ci.yml and codeql-schedule.yml register two
          # separate configurations. A pull request only ever produces the
          # ci.yml one, and code scanning then reports "1 configuration not
          # found" and refuses to say which alerts the PR introduced — which
          # leaves the code_scanning merge rule waiting forever. One fixed
          # category keeps every caller on the same configuration.
          category: /language:${{ matrix.language }}
