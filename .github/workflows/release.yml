name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Least privilege by default; the publish job elevates to contents: write to
# create the GitHub release.
permissions:
  contents: read

# Never cancel a release mid-publish (unlike CI's PR runs).
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# The quality gate mirrors the PR `ci-ok` inputs (format, cross-OS tests,
# control-client build, Electron installer smoke, E2E, dependency licenses)
# so a tag can never ship code that would have failed a PR. Unlike CI there
# are no docs-only path filters: a release always builds and ships binaries,
# so every check runs unconditionally. `publish` fans out only after all of them pass.
jobs:
  # Prettier (also Markdown/YAML), ESLint and tsc — the CI `checks` job.
  checks:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Format (Prettier)
        run: npm run format:check
      - name: Lint (ESLint)
        if: ${{ !cancelled() }}
        run: npm run lint
      - name: Typecheck (tsc)
        if: ${{ !cancelled() }}
        run: npm run typecheck

  # Cross-OS unit tests. A release ships binaries for all three platforms, so
  # the gate runs the full matrix rather than trusting a Linux-only leg.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: npm test

  build:
    name: Build (web control client)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: npm -w streamwall-control-client run build

  # Installer smoke test before the three-OS publish matrix fans out: a
  # Vite/Forge misconfiguration, a native-module unpacking failure, a
  # rejected maker config or a broken `postMake` update-metadata hook fails
  # here once instead of half-way through the publish matrix, where a failed
  # leg leaves a partially populated GitHub release behind and the tag has to
  # be redone (#453).
  #
  # `make`, not just `package`: the weekly `packaging.yml` matrix (#425)
  # exercises the makers too, but it is up to a week stale and does not gate
  # the tag.
  #
  # One leg per platform, mirroring the publish matrix: MakerZIP is
  # darwin-only and the NSIS maker needs a Windows host, so each runner makes
  # for itself. That also covers both halves of the update-metadata hook
  # (`latest.yml` on Windows, `latest-mac.yml` on macOS), which would
  # otherwise run for the first time inside a publish leg (#517).
  make:
    name: Installer smoke (${{ matrix.leg.name }} makers)
    runs-on: ${{ matrix.leg.os }}
    timeout-minutes: 30
    strategy:
      # One broken platform must not hide the state of the other.
      fail-fast: false
      matrix:
        leg:
          # `artifacts` is the whitespace-separated list of kinds only this
          # runner can produce; the verification step below asserts each one.
          - name: linux
            os: ubuntu-latest
            artifacts: '*.deb *.rpm'
          - name: windows
            os: windows-latest
            artifacts: '*-setup-*.exe latest.yml'
          - name: macos
            os: macos-latest
            artifacts: '*.zip latest-mac.yml'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      # MakerRpm shells out to `rpmbuild`, MakerDeb to `dpkg`/`fakeroot`.
      # Only the latter two ship on the GitHub Ubuntu runner image.
      - name: Install Linux maker tooling
        if: matrix.leg.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm fakeroot

      # Host-platform makers: deb/rpm on Linux, the NSIS installer plus the
      # `latest.yml` half of the update-metadata hook on Windows, the darwin
      # ZIP on macOS. Each leg makes for its own platform: cross-building the
      # NSIS installer from Linux needs Wine, which the Ubuntu runner image no
      # longer ships (`spawn wine ENOENT`), and the publish matrix builds
      # Windows on a Windows runner anyway.
      - name: Make (host installers)
        run: npm -w streamwall run make

      # A maker that is silently skipped (unsupported-platform detection, a
      # config change that drops it) produces no output but also no error, so
      # the expected artifact kinds are asserted explicitly.
      - name: Verify installer artifacts
        shell: bash
        env:
          EXPECTED_ARTIFACTS: ${{ matrix.leg.artifacts }}
        run: |
          make_dir=packages/streamwall/out/make
          find "$make_dir" -type f -print | sort
          for pattern in $EXPECTED_ARTIFACTS; do
            if [ -z "$(find "$make_dir" -type f -name "$pattern" -print -quit)" ]; then
              echo "::error::No $pattern artifact found in $make_dir"
              exit 1
            fi
          done

  # End-to-end smoke tests: the control client in a real Chromium browser
  # against a real control server + fake Streamwall uplink. Linux-only (the
  # Playwright browser install with system deps is Linux-only).
  e2e:
    name: E2E smoke (control client)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke tests
        run: npm -w streamwall-control-e2e run test:e2e

  # Same license allowlist the PR gate enforces: a release must not ship a
  # dependency whose license is incompatible with redistribution.
  licenses:
    name: Dependency licenses
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: npm run licenses:check

  # Create the draft release exactly once, before the three-platform publish
  # matrix fans out. Each publish leg runs electron-forge's GitHub publisher,
  # which looks the release up by tag and only creates it when none exists
  # (check-then-create). With no draft present yet, two legs can pass that check
  # concurrently and each creates its own draft: the release splits into one
  # draft holding the notes and the mac/windows assets and a second, notes-less
  # draft holding just the Linux installers, so `latest.yml` never references
  # them and `gh release edit <tag>` becomes ambiguous (#671). Materializing the
  # draft here first means every forge publisher finds it and only appends
  # assets.
  #
  # The step is gated on a tag ref rather than the whole job so a
  # workflow_dispatch run (whose ref carries no version to name a release by)
  # still satisfies the publish matrix's `needs` and behaves exactly as before.
  prepare-release:
    name: Prepare draft release
    needs: [checks, test, build, make, e2e, licenses]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # electron-forge's publishers append assets to this draft
    steps:
      - name: Create the draft release if it does not exist
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The job never checks the repository out, so `gh` cannot infer the
          # target from a git remote.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          # Idempotent: a re-run of an already-handled tag — or a forge
          # publisher that raced ahead of this job — must not fail here.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists — nothing to prepare."
            exit 0
          fi
          # Empty notes: release-notes below fills the body once every asset is
          # uploaded. Draft so the publish matrix appends before it goes live.
          gh release create "$TAG" --draft --title "$TAG" --notes ""
          echo "::notice::Created draft release $TAG for the publish matrix to append to."

  publish:
    name: Publish (${{ matrix.platform.name }})
    needs: [checks, test, build, make, e2e, licenses, prepare-release]
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 30
    permissions:
      contents: write # electron-forge's GitHub publisher creates/updates the release
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux, os: ubuntu-latest }
          - { name: windows, os: windows-latest }
          - { name: macos, os: macos-latest }
    # Signing is opt-in (see packages/streamwall/forge.signing.ts): builds
    # stay unsigned, exactly as before, until these secrets are provisioned.
    # `secrets` isn't available in step `if:` conditions, so the presence
    # checks are hoisted into job-level env vars here.
    env:
      APPLE_SIGNING_CONFIGURED: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
      APPLE_NOTARIZATION_CONFIGURED: ${{ secrets.APPLE_API_KEY_BASE64 != '' }}
      WINDOWS_SIGNING_CONFIGURED: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Import macOS signing certificate
        if: matrix.platform.name == 'macos' && env.APPLE_SIGNING_CONFIGURED == 'true'
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Write macOS notarization API key
        if: matrix.platform.name == 'macos' && env.APPLE_NOTARIZATION_CONFIGURED == 'true'
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          key_path="$RUNNER_TEMP/apple-api-key.p8"
          base64 --decode <<< "$APPLE_API_KEY_BASE64" > "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Write Windows signing certificate
        if: matrix.platform.name == 'windows' && env.WINDOWS_SIGNING_CONFIGURED == 'true'
        shell: bash
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          cert_path="$RUNNER_TEMP/windows-cert.pfx"
          base64 --decode <<< "$WINDOWS_CERTIFICATE_BASE64" > "$cert_path"
          echo "WINDOWS_CERTIFICATE_FILE=$cert_path" >> "$GITHUB_ENV"

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm -w streamwall run publish

  # The self-hosting image (#478). CI already builds and boots this Dockerfile
  # on every PR that touches it, but throws the result away, so operators had
  # to clone the repo and run the whole toolchain build on their own host with
  # no immutable artifact to pin or roll back to. Publishing it here makes
  # `docker compose pull` the update path and every release an addressable
  # version tag.
  #
  # Runs alongside the desktop publish matrix rather than after it: the two
  # ship unrelated artifacts, and a registry outage should not hold back the
  # binaries (or the other way round). Both wait for the same quality gate.
  # Both architectures build natively, one runner each (`ubuntu-24.04-arm` is
  # free for public repositories). Emulating the arm64 leg with QEMU instead
  # would run `npm ci` for four workspaces plus the Vite control-client build
  # under emulation and dominate the release wall-clock time (#524).
  #
  # Because the two legs cannot push the same tag without racing, each pushes
  # an untagged, digest-addressed image (`push-by-digest`) and hands the digest
  # to `docker-manifest` below, which merges them into one multi-arch manifest
  # that the `<version>` and `latest` tags then point at.
  docker-image:
    name: Publish (control-server image, ${{ matrix.platform.arch }})
    needs: [checks, test, build, make, e2e, licenses]
    # Only a tag carries the version to publish under; a workflow_dispatch run
    # would otherwise move `latest` to an unreleased commit.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write # pushing to ghcr.io/<owner>/streamwall-control-server
    strategy:
      # One broken architecture must not hide the state of the other.
      fail-fast: false
      matrix:
        platform:
          - { arch: amd64, runner: ubuntu-latest }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derived from the owner rather than hardcoded so a repository transfer
      # does not silently keep publishing under the old account. Lowercased
      # here because GHCR rejects uppercase image names and `push-by-digest`
      # takes the name verbatim (unlike `metadata-action`, which lowercases it
      # for the tags in the manifest job below).
      - name: Derive the image name
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/streamwall-control-server" >> "$GITHUB_OUTPUT"

      - name: Derive image labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.image.outputs.name }}

      # No `tags:` — a digest-addressed push must stay untagged, or both legs
      # would fight over the same tag and the last one to finish would win.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: packages/streamwall-control-server/Dockerfile
          platforms: linux/${{ matrix.platform.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true

      # The digest travels as an empty file named after it: artifact names have
      # to differ per leg, but their *contents* merge into one directory for
      # the manifest job.
      - name: Export the digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          touch "$RUNNER_TEMP/digests/${DIGEST#sha256:}"

      - name: Upload the digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: control-server-image-digest-${{ matrix.platform.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merges the per-architecture digests pushed above into the single multi-arch
  # manifest that `<version>` and `latest` resolve to, so `docker compose pull`
  # keeps referencing one tag and Docker picks the right architecture.
  docker-manifest:
    name: Publish (control-server image manifest)
    needs: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write # tagging the merged manifest in GHCR
    steps:
      # `merge-multiple` flattens both leg artifacts into one directory, one
      # empty file per digest.
      - name: Download the digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: control-server-image-digest-*
          merge-multiple: true
          path: ${{ runner.temp }}/digests

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive the image name
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/streamwall-control-server" >> "$GITHUB_OUTPUT"

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Create the multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          # One `-t <tag>` pair per tag, one image reference per digest file.
          mapfile -t tags < <(jq -r '.tags[] | "-t", .' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          refs=()
          for digest in *; do
            refs+=("$IMAGE_NAME@sha256:$digest")
          done
          docker buildx imagetools create "${tags[@]}" "${refs[@]}"

      # A manifest that silently lost an architecture (a leg that pushed
      # nothing, a digest artifact that never arrived) is indistinguishable
      # from a good one until an arm64 host tries to pull it, so assert both
      # platforms are actually in the published manifest.
      - name: Verify both platforms are published
        env:
          IMAGE_REF: ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}
        run: |
          platforms=$(docker buildx imagetools inspect "$IMAGE_REF" \
            --format '{{json .Manifest}}' \
            | jq -r '.manifests[].platform | select(.os != "unknown") | .os + "/" + .architecture')
          echo "$platforms"
          for expected in linux/amd64 linux/arm64; do
            if ! grep -qx "$expected" <<< "$platforms"; then
              echo "::error::$IMAGE_REF is missing $expected"
              exit 1
            fi
          done

  # release-please stops building release PRs while a merged one still carries
  # `autorelease: pending` — it logs "There are untagged, merged release PRs
  # outstanding - aborting" and exits successfully, so its workflow stays green
  # (an 11s run) while every commit on `main` piles up unreleased. That label is
  # normally cleared by release-please's own GitHub-release step, which this
  # repository skips (`skip-github-release`, see release-please.yml) because the
  # tag has to be pushed by hand. Cutting the tag is therefore the moment the
  # label has to move, and this job is that moment (#611).
  #
  # The label `autorelease: tagged` must exist in the repository; `gh pr edit`
  # fails on an unknown label, which is the intended outcome — a loud failure in
  # the release run beats the silent blockage this job exists to prevent.
  release-pr-label:
    name: Mark the release PR as tagged
    needs: [publish]
    # A workflow_dispatch run carries no version to look a release PR up by.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write # relabelling the merged release PR
    steps:
      - name: Move the release PR from pending to tagged
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The job never checks the repository out, so `gh` cannot infer the
          # target from a git remote.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          number=$(gh pr list --state merged --label 'autorelease: pending' \
            --search "\"release $version\" in:title" \
            --json number --jq '.[0].number // empty')
          if [ -z "$number" ]; then
            # A release cut by hand (`npm run release:version`) has no release
            # PR to relabel, and neither has a re-run of an already handled tag.
            echo "::notice::No merged release PR labelled 'autorelease: pending' for $version — nothing to relabel."
            exit 0
          fi
          gh pr edit "$number" \
            --add-label 'autorelease: tagged' \
            --remove-label 'autorelease: pending'
          echo "::notice::Marked release PR #$number as tagged; release-please can build the next release PR."

  # electron-forge's GitHub publisher creates the release for the tag but leaves
  # its body empty. The changelog section for that version — generated from the
  # Conventional Commit subjects by release-please.yml — is exactly the release
  # note, so copy it over once all three platforms have uploaded their assets.
  release-notes:
    name: Release notes
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # editing the release body
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Publish the changelog section as release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          notes="$RUNNER_TEMP/release-notes.md"
          node scripts/changelog-section.mjs "${TAG#v}" > "$notes"
          gh release edit "$TAG" --notes-file "$notes"
